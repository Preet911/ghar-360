{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="max-w-xl mx-auto bg-white shadow-xl rounded-3xl p-8 border border-gray-200">
    
    <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">✏️ Edit Profile</h2>

    <form method="POST">
        {% csrf_token %}
        
        {% for field in form %}
            <div class="mb-4">
                <label class="block font-semibold mb-1 text-gray-700">
                    {{ field.label }}
                </label>
                {{ field }}
                {% if field.errors %}
                    <p class="text-red-600 text-sm mt-1">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
        {% endfor %}

        <div class="flex justify-between mt-6">
            <a href="{% url 'profile' %}"
               class="px-5 py-2 bg-gray-300 rounded-lg font-semibold hover:bg-gray-400 transition">
               Cancel
            </a>

            <button type="submit"
                class="px-6 py-2 bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-semibold rounded-lg shadow hover:shadow-xl transition">
                Save Changes
            </button>
        </div>
    </form>
</div>
{% endblock %}
